name: Deploy to Cloud Run

on:
  workflow_dispatch:  # Manual trigger only until WIF is fixed
  # push:
  #   branches: [main]

env:
  PROJECT_ID: resolution-hack
  REGION: us-east1
  SERVICE: yu-restos
  IMAGE: us-east1-docker.pkg.dev/resolution-hack/yu-restos/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build -f Dockerfile.cloud -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .

      - name: Push image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,OURA_ACCESS_TOKEN=OURA_ACCESS_TOKEN:latest,OURA_REFRESH_TOKEN=OURA_REFRESH_TOKEN:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest \
            --min-instances=0 \
            --max-instances=3 \
            --memory=512Mi \
            --timeout=60

      - name: Show URL
        run: |
          echo "Deployed: https://yu-restos-471409463813.us-east1.run.app"
          gcloud run services describe $SERVICE --region $REGION --format="value(status.url)"
